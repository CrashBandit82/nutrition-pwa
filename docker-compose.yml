version: '3.8'

services:
  # Backend API
  nutrition-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nutrition-api
    # PORTS WURDEN ENTFERNT: Portainer behält Port 8000, API kommuniziert nur noch intern!
    volumes:
      - ./backend:/app
      - nutrition-db:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/nutrition_app.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: nutrition-pwa
    ports:
      - "80:80"
    depends_on:
      - nutrition-api
    restart: unless-stopped

volumes:
  nutrition-db:
    driver: local
